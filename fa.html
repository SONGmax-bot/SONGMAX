<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire | هدايا و شدات</title>
    <!-- Google Fonts - خط عربي عصري -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0d0f14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            color: #fff;
        }

        /* خلفية متحركة من الإنترنت - صورة من Free Fire (Pexels) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.pexels.com/photos/6994904/pexels-photo-6994904.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.25) blur(4px);
            z-index: -2;
        }

        /* طبقة برتقالية شفافة لإضفاء جو فري فاير */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 69, 0, 0.2); /* برتقالي ناري شفاف */
            z-index: -1;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(25, 20, 20, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 60px 60px 30px 30px;
            padding: 40px 30px;
            border: 2px solid #ff7b00;
            box-shadow: 0 25px 50px -8px #ff3300, 0 0 30px #ffaa00 inset;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* تأثير نار بسيط */
        .container::before {
            content: "";
            position: absolute;
            top: -30px; left: 0;
            width: 100%; height: 60px;
            background: linear-gradient(180deg, #ff7b00 0%, transparent 100%);
            opacity: 0.3;
            border-radius: 50%;
            filter: blur(20px);
        }

        /* شعار Free Fire من الإنترنت */
        .ff-logo {
            width: 200px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 25px #ff9900);
            transition: transform 0.3s;
        }
        .ff-logo:hover {
            transform: scale(1.08) rotate(2deg);
        }

        h1 {
            font-size: 2.7rem;
            font-weight: 900;
            background: linear-gradient(145deg, #ffb347, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px #ff5500, 0 0 40px #ffaa00;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #ffcc99;
            margin-bottom: 25px;
            border-bottom: 2px solid #ff7b00;
            padding-bottom: 10px;
            display: inline-block;
        }

        .subtitle i {
            color: #ffaa00;
            margin: 0 5px;
        }

        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 30px 0;
        }

        /* تصميم الأزرار النارية */
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(145deg, #2b1e1e, #1a0f0f);
            border: 2px solid #ff7b00;
            border-radius: 80px;
            padding: 14px 25px;
            text-decoration: none;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 8px 0 #b35000, 0 10px 30px rgba(255, 69, 0, 0.6);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 0 #b35000, 0 20px 40px #ff6600;
            background: linear-gradient(145deg, #3f2c2c, #2f1b1b);
            border-color: #ffa500;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b35000;
        }

        /* شعلة خلف الزر عند الهوفر */
        .btn::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,125,0,0.4) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .btn:hover::after {
            opacity: 1;
        }

        /* أيقونة الزر */
        .btn i {
            font-size: 2.4rem;
            color: #ff9933;
            text-shadow: 0 0 15px #ff4400;
            width: 50px;
            text-align: center;
            transition: 0.2s;
            z-index: 2;
        }

        .btn:hover i {
            transform: scale(1.3) rotate(5deg);
            color: #ffbb33;
        }

        .btn span {
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 2;
        }

        .arrow-icon {
            font-size: 2rem;
            opacity: 0.8;
            transition: 0.2s;
        }

        .btn:hover .arrow-icon {
            opacity: 1;
            transform: translateX(-8px);
            color: #ffbb33;
        }

        /* شخصيات فري فاير من الإنترنت (صور) */
        .characters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0 20px;
            flex-wrap: wrap;
        }

        .characters img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ff7b00;
            box-shadow: 0 0 25px #ff8800;
            transition: 0.3s;
            background: #000;
        }

        .characters img:hover {
            transform: scale(1.15) rotate(3deg);
            border-color: #fff;
            box-shadow: 0 0 35px #ffaa00;
        }

        /* قسم إضافي لصور أسلحة من فري فاير */
        .weapons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .weapons img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 20px;
            border: 2px solid #ff7b00;
            filter: drop-shadow(0 0 10px #ff8800);
            transition: 0.2s;
        }

        .weapons img:hover {
            transform: translateY(-8px);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border-radius: 50px;
            border: 1px solid #ff7b00;
            color: #ffcc99;
        }

        .footer-note strong {
            color: #ffaa00;
            font-size: 1.3rem;
        }

        /* تصميم متجاوب */
        @media (max-width: 500px) {
            .container { padding: 30px 15px; }
            .btn { font-size: 1.2rem; padding: 10px 15px; }
            .btn i { font-size: 1.8rem; }
            h1 { font-size: 2rem; }
            .ff-logo { width: 150px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- شعار Free Fire من الإنترنت -->
        <img class="ff-logo" src="https://i.pinimg.com/originals/11/7b/3b/117b3b8a4c1b0d2e4b5b4e4b5b4e4b5b.png" 
             alt="Free Fire Logo"
             onerror="this.onerror=null; this.src='https://logodownload.org/wp-content/uploads/2019/12/free-fire-logo-5.png';">

        <h1>🔥 فري فاير مجانا 🔥</h1>
        <div class="subtitle">
            <i class="fas fa-skull"></i> هدايا الشدات والعروض الحصرية <i class="fas fa-skull"></i>
        </div>

        <!-- الأزرار المطلوبة - كلها تحول إلى ببجي.html كما طلبت -->
        <div class="buttons-grid">
            <a href="fo.html" class="btn">
                <i class="fas fa-gem"></i>
                <span>عرض الأول 500 شدت مجانا <i class="fas fa-arrow-left arrow-icon"></i></span>
            </a>
            <a href="fo.html" class="btn">
                <i class="fas fa-coins"></i>
                <span>250 شدت مجانا <i class="fas fa-arrow-left arrow-icon"></i></span>
            </a>
            <a href="fo.html" class="btn">
                <i class="fas fa-music"></i>
                <span>رقص الفرعون <i class="fas fa-arrow-left arrow-icon"></i></span>
            </a>
            <a href="fo.html" class="btn">
                <i class="fas fa-vest"></i>
                <span>ملابس الفرعون <i class="fas fa-arrow-left arrow-icon"></i></span>
            </a>
            <a href="fo.html" class="btn">
                <i class="fas fa-gun"></i>
                <span>أم فور تلجي <i class="fas fa-arrow-left arrow-icon"></i></span>
            </a>
        </div>

        <!-- صور شخصيات فري فاير من الإنترنت -->
        <div class="characters">
            <img src="https://images.pexels.com/photos/15876128/pexels-photo-15876128.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Free Fire Character">
            <img src="https://images.pexels.com/photos/15409796/pexels-photo-15409796.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Free Fire Character 2">
            <img src="https://images.pexels.com/photos/6994904/pexels-photo-6994904.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Free Fire Game">
            <img src="https://images.pexels.com/photos/15939338/pexels-photo-15939338.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Free Fire Skin">
        </div>

        <!-- أسلحة فري فاير -->
        <div class="weapons">
            <img src="https://images.pexels.com/photos/6114957/pexels-photo-6114957.jpeg?auto=compress&cs=tinysrgb&w=600" alt="M4">
            <img src="https://images.pexels.com/photos/6114958/pexels-photo-6114958.jpeg?auto=compress&cs=tinysrgb&w=600" alt="AK">
            <img src="https://images.pexels.com/photos/6114959/pexels-photo-6114959.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Sniper">
        </div>

        
         
</body>
</html>
