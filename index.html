<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أزرار الخدمات المجانية</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts للخط العربي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b1a2e, #1b2f44), url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2028&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center fixed;
            background-size: cover;
            background-blend-mode: overlay;
            padding: 20px;
            position: relative;
        }

        /* طبقة داكنة شفافة لتحسين التباين */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1300px;
            text-align: center;
        }

        h1 {
            color: white;
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 50px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            letter-spacing: 1px;
            word-break: break-word;
        }

        h1 span {
            background: linear-gradient(45deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        .btn-card {
            display: block;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 30px 20px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
        }

        .btn-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
        }

        .btn-card:active {
            transform: translateY(0) scale(0.98);
        }

        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .icon {
            font-size: 4rem;
            background: linear-gradient(145deg, #fff8, #fff2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
            transition: transform 0.3s;
        }

        .btn-card:hover .icon {
            transform: scale(1.1) rotate(5deg);
        }

        .text {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.5;
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ffb703;
            color: #0b1a2e;
            font-weight: 900;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.2rem;
            box-shadow: 0 0 15px #ffb703;
            border: 2px solid white;
        }

        /* ألوان الأيقونات حسب الخدمة */
        .btn-card:nth-child(1) .icon { color: #ff6b6b; }      /* PUBG */
        .btn-card:nth-child(2) .icon { color: #ff8c42; }      /* Free Fire */
        .btn-card:nth-child(3) .icon { color: #4267B2; }      /* Facebook */
        .btn-card:nth-child(4) .icon { color: #000000; }      /* TikTok */
        .btn-card:nth-child(5) .icon { color: #E1306C; }      /* Instagram */
        .btn-card:nth-child(6) .icon { color: #34a853; }      /* Google */

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .buttons-grid { gap: 15px; }
            .text { font-size: 1.2rem; }
            .icon { font-size: 3rem; }
        }

        /* تلميح بسيط اختياري (يمكن حذفه) */
        .hint {
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            backdrop-filter: blur(5px);
        }
        .hint i { margin: 0 5px; }
        .hint a { color: #ffd966; text-decoration: none; }
        .hint a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✦ <span>خدماتنا المجانية</span> ✦</h1>
        
        <div class="buttons-grid">
            <!-- 1. شحن ببجي مجانا -> ip/ببجي.html -->
            <a href="lo.html" class="btn-card" target="_self">
                <div class="badge">1</div>
                <div class="card-content">
                    <i class="fas fa-gamepad icon"></i>
                    <span class="text">شحن ببجي مجانا</span>
                </div>
            </a>

            <!-- 2. شحن فير فاير مجانا -> ip/زاررفير.html (حسب الطلب) -->
            <a href="fa.html" class="btn-card" target="_self">
                <div class="badge">2</div>
                <div class="card-content">
                    <i class="fas fa-fire icon"></i>
                    <span class="text">شحن فير فاير مجانا</span>
                </div>
            </a>

            <!-- 3. زيادة المتابعين في فيسبوك -> ip/Facebook.html -->
            <a href="Facebook.html" class="btn-card" target="_self">
                <div class="badge">3</div>
                <div class="card-content">
                    <i class="fab fa-facebook icon"></i>
                    <span class="text">زيادة المتابعين في فيسبوك</span>
                </div>
            </a>

            <!-- 4. زيادة المتابعين في تيك توك -> ip/تيك توك.html -->
            <a href="تيك توك.html" class="btn-card" target="_self">
                <div class="badge">4</div>
                <div class="card-content">
                    <i class="fab fa-tiktok icon"></i>
                    <span class="text">زيادة المتابعين في تيك توك</span>
                </div>
            </a>

            <!-- 5. زيادة المتابعين في إنستغرام -> ip/nstagram.html (حسب الطلب) -->
            <a href="nstagram.html" class="btn-card" target="_self">
                <div class="badge">5</div>
                <div class="card-content">
                    <i class="fab fa-instagram icon"></i>
                    <span class="text">زيادة المتابعين في إنستغرام</span>
                </div>
            </a>

            <!-- 6. شحن Google مجانا -> ip/Google/index.html (كما أضافها المستخدم) -->
            <a href="Google.html" class="btn-card" target="_self">
                <div class="badge">6</div>
                <div class="card-content">
                    <i class="fab fa-google icon"></i>
                    <span class="text">شحن Google مجانا</span>
                </div>
            </a>
        </div>

        <!-- تلميح بسيط (اختياري) -->
        <div class="hint">
            <i class="fas fa-folder-open"></i> جميع الأزرار توجه إلى ملفات داخل مجلد <strong>ip</strong>
        </div>
    </div>
</body>
</html>
